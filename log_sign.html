  <div class="login-page-wrapper">
    <div class="wrapper">
      <div class="title-text">
        <div class="title login">
          Account
        </div>
        <div class="title signup">
          Account
        </div>
      </div>
      <div class="form-container">
        <div class="slide-controls">
          <input type="radio" name="slide" id="login" checked>
          <input type="radio" name="slide" id="signup">
          <label for="login" class="slide login">Login</label>
          <label for="signup" class="slide signup">SignUp</label>
          <div class="slider-tab"></div>
        </div>
        <div class="form-inner">
          <form action="#" class="login">
            <div class="field">
              <input type="text" placeholder="Email Address" required>
            </div>
            <div class="field password-field">
              <input type="password" placeholder="Password" required>
              <span class="eye-icon" onclick="togglePassword(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </div>
            <div class="pass-link">
              <a href="#">Reset password?</a>
            </div>
            <button type="submit" class="btn btn-primary login-submit-btn">Login</button>
            <div class="signup-link">
              Don't Have Account? <a href="">Create A New</a>
            </div>
          </form>
          <form action="#" class="signup">
            <div class="field">
              <input type="text" placeholder="Email Address" required>
            </div>
            <div class="field password-field">
              <input type="password" id="signup-password" placeholder="Password" required oninput="validateSignupPassword()">
              <span class="eye-icon" onclick="togglePassword(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </div>
            <div class="password-rules" id="password-rules">
              <p id="rule-length"><span class="rule-icon">✕</span> At least 8 characters</p>
              <p id="rule-upper"><span class="rule-icon">✕</span> One uppercase letter</p>
              <p id="rule-number"><span class="rule-icon">✕</span> One number</p>
              <p id="rule-special"><span class="rule-icon">✕</span> One special character</p>
            </div>
            <div class="field password-field">
              <input type="password" id="signup-confirm" placeholder="Confirm Password" required oninput="checkPasswordMatch()">
              <span class="eye-icon" onclick="togglePassword(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </span>
            </div>
            <p class="match-msg" id="match-msg"></p>
            <button type="submit" class="btn btn-primary login-submit-btn">Sign Up</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const loginText = document.querySelector(".title-text .login");
    const loginForm = document.querySelector("form.login");
    const loginBtn = document.querySelector("label.login");
    const signupBtn = document.querySelector("label.signup");
    const signupLink = document.querySelector("form .signup-link a");
    signupBtn.onclick = (() => {
      loginForm.style.marginLeft = "-50%";
      loginText.style.marginLeft = "-50%";
    });
    loginBtn.onclick = (() => {
      loginForm.style.marginLeft = "0%";
      loginText.style.marginLeft = "0%";
    });
    signupLink.onclick = (() => {
      signupBtn.click();
      return false;
    });

    // Toggle password visibility
    function togglePassword(el) {
      const input = el.parentElement.querySelector('input');
      if (input.type === 'password') {
        input.type = 'text';
        el.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        input.type = 'password';
        el.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    }

    // Password validation for signup
    function validateSignupPassword() {
      const pw = document.getElementById('signup-password').value;
      const rules = {
        'rule-length': pw.length >= 8,
        'rule-upper': /[A-Z]/.test(pw),
        'rule-number': /[0-9]/.test(pw),
        'rule-special': /[!@#$%^&*(),.?":{}|<>]/.test(pw)
      };
      for (const [id, passed] of Object.entries(rules)) {
        const el = document.getElementById(id);
        if (passed) {
          el.classList.add('passed');
          el.querySelector('.rule-icon').textContent = '✓';
        } else {
          el.classList.remove('passed');
          el.querySelector('.rule-icon').textContent = '✕';
        }
      }
      checkPasswordMatch();
    }

    // Confirm password match
    function checkPasswordMatch() {
      const pw = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm');
      const msg = document.getElementById('match-msg');
      if (confirm.value === '') {
        confirm.classList.remove('match', 'no-match');
        msg.textContent = '';
        return;
      }
      if (pw === confirm.value) {
        confirm.classList.add('match');
        confirm.classList.remove('no-match');
        msg.textContent = 'Passwords match!';
        msg.style.color = '#10b981';
      } else {
        confirm.classList.add('no-match');
        confirm.classList.remove('match');
        msg.textContent = 'Passwords do not match';
        msg.style.color = '#ef4444';
      }
    }
  </script>
